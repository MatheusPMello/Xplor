<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Get in touch with Xplor. We're here to help you plan your next great adventure.">
    <title>Contact Us - Xplor</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <nav id="main-nav">
            <div class="nav-links">
                <a href="home.html">Home</a>
                <a href="about.html">About us</a>
                <a href="contact.html">Contact us</a>
            </div>
            <form class="search-form">
                <input type="text" id="destination-search" placeholder="Enter a destination or keyword">
                <button type="submit" id="btn-search">Search</button>
            </form>
        </nav>
    </header>

    <main>
        <section class="hero-section">
            <div class="socials">
                <a href="#" aria-label="Facebook"><img src="images/facebook.png" alt="Facebook icon"></a>
                <a href="#" aria-label="Instagram"><img src="images/instagram.png" alt="Instagram icon"></a>
                <a href="https://x.com/" aria-label="Twitter"><img src="images/twitter.png" alt="Twitter icon"></a>
            </div>

            <div class="about-section">
                <div class="about-header">
                    <h2>CONTACT US</h2>
                    <p>
                        Get in touch with us for any inquiries or assistance.
                    </p>
                    <div class="contact-form-container">
                        <form class="contact-form" action="contact.html">
                            <div class="form-group">
                                <label for="name">Name</label>
                                <input type="text" id="name" name="name" placeholder="Enter your name" required>
                            </div>
                            <div class="form-group">
                                <label for="email">Email</label>
                                <input type="email" id="email" name="email" placeholder="Enter your email" required>
                            </div>
                            <div class="form-group">
                                <label for="message">Message</label>
                                <textarea id="message" name="message" placeholder="Enter your message" rows="4" required></textarea>
                            </div>
                            <button type="submit" class="btn-primary">Send Message</button>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="travel_recommendation.js"></script>
</body>

</html>
